version: "3.9"

# Total RAM budget: ~1.75 GB < 60% of 16 GB (9.6 GB cap)

services:

  # Frontend (Nginx + React) 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shim_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: 256M
    cpus: "0.50"
    networks:
      - shim-net

  # Backend (Node.js / Express) 
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shim_backend
    ports:
      - "3001:3001"

    runtime: nvidia

    environment:
      PORT: "3001"
      ML_SERVICE_URL: "http://ml:5000"
      NODE_ENV: production
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all

    volumes:
      - metrics-data:/app/data
    depends_on:
      - ml
    restart: unless-stopped
    mem_limit: 512M
    cpus: "1.00"
    networks:
      - shim-net

  # ML Service (Python / Flask) 
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: shim_ml
    ports:
      - "5000:5000"
    runtime: nvidia 
    
    environment:
      PORT: "5000"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    restart: unless-stopped
    mem_limit: 1G
    cpus: "1.50"
    
    deploy:
      resources:
        reservations:
          devices:
          - capabilities: [gpu]
    
    networks:
      - shim-net

volumes:
  metrics-data:
    driver: local

networks:
  shim-net:
    driver: bridge
